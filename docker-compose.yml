services:
  db:
    image: postgres:15-alpine
    container_name: finkixp-db
    environment:
      POSTGRES_DB: finkiXp
      POSTGRES_USER: emt
      POSTGRES_PASSWORD: emt
    ports:
      - "2345:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emt -d finkiXp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finkixp-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/finkiXp
      - SPRING_DATASOURCE_USERNAME=emt
      - SPRING_DATASOURCE_PASSWORD=emt
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finkixp-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
