apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finkixp-ingress
  namespace: finkixp-ns
spec:
  ingressClassName: nginx
  rules:
  - host: finkixp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finkixp-frontend
            port:
              number: 3000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: finkixp-backend
            port:
              number: 8085
